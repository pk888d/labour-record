# Musterly (LabourRecord) — nginx reverse proxy.
# Deploy on the server as:  /etc/nginx/conf.d/musterly.conf
#   sudo cp man/musterly.nginx.conf /etc/nginx/conf.d/musterly.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Mirrors inventra.conf style: plain HTTP by IP, no domain, no SSL.
# Port 80 is taken by inventra (listen 80 default_server); 8080 is free and
# already open in firewalld. Requires SELinux httpd_can_network_connect=on
# (already enabled on this host, since inventra also proxies to local ports).
server {
    listen 8080;
    server_name _;

    # Allow large form/print payloads
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
